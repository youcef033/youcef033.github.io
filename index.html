<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BENAMAR Youcef — e-Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c10;
      --bg2: #111318;
      --bg3: #171a21;
      --accent: #00d4ff;
      --accent2: #7b5ea7;
      --text: #e8eaf0;
      --muted: #8a8fa8;
      --card: #14161e;
      --border: rgba(255,255,255,0.07);
      --glow: 0 0 30px rgba(0,212,255,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 10px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.1rem 3rem;
      background: rgba(11,12,16,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* ── HERO ── */
    #accueil {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 8rem 3rem 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero-grid {
      position: absolute; inset: 0; opacity: 0.04;
      background-image: linear-gradient(rgba(0,212,255,0.5) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.5) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }
    .hero-orb-1 {
      width: 500px; height: 500px;
      background: rgba(0,212,255,0.07);
      top: -150px; right: -100px;
    }
    .hero-orb-2 {
      width: 400px; height: 400px;
      background: rgba(123,94,167,0.08);
      bottom: -100px; left: -50px;
    }
    .hero-content { position: relative; max-width: 900px; }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent);
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      padding: 0.4rem 1rem; border-radius: 100px;
      margin-bottom: 1.8rem;
      animation: fadeUp 0.6s ease both;
    }
    .hero-tag::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      animation: fadeUp 0.7s ease 0.1s both;
    }
    .hero-name span { color: var(--accent); }
    .hero-subtitle {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      font-weight: 600;
      color: var(--muted);
      margin-top: 0.8rem;
      animation: fadeUp 0.7s ease 0.2s both;
    }
    .hero-desc {
      max-width: 600px;
      color: var(--muted);
      font-size: 1rem;
      margin-top: 1.5rem;
      animation: fadeUp 0.7s ease 0.3s both;
    }
    .hero-actions {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-top: 2.5rem;
      animation: fadeUp 0.7s ease 0.4s both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-size: 0.9rem; font-weight: 500;
      text-decoration: none;
      transition: all 0.25s;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: #00b8d9; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.3); }
    .btn-ghost {
      border: 1px solid var(--border);
      color: var(--text);
      background: transparent;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    /* ── SECTIONS SHARED ── */
    section { padding: 6rem 3rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .section-tag::before { content: '//'; opacity: 0.5; }
    h2.section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
      line-height: 1.1;
    }
    h2.section-title em { color: var(--accent); font-style: normal; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); max-width: 1100px; margin: 0 auto; }

    /* ── PROFIL ── */
    #profil { background: var(--bg2); }
    .profil-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }
    .profil-text p { color: var(--muted); margin-bottom: 1.2rem; font-size: 0.95rem; }
    .profil-info { display: flex; flex-direction: column; gap: 1.2rem; }
    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.6rem;
      display: flex; align-items: flex-start; gap: 1rem;
    }
    .info-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius
